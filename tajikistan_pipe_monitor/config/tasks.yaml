scout_task:
  description: >
    Ниже — список тендеров, предзагруженных из 10 источников
    (World Bank, ADB, DGMarket, IsDB, EFSD, WSIP-1, MEWR, tenders.tj).

    КАНДИДАТЫ:
    {candidates_text}

    Отбери только тендеры по водоснабжению, ирригации, канализации, трубопроводам
    в Таджикистане. Исключи газ, нефть, электроэнергетику.
    Для каждого верни: title, url, donor, date, source.
    ВАЖНО: отбери не более {max_results} лучших тендеров.
  expected_output: >
    JSON-список отобранных тендеров. Каждый элемент: title, url, donor, date, source.
    Только Таджикистан, только вода/ирригация/трубы. Максимум {max_results} записей.

details_task:
  description: >
    Для каждого тендера из списка ScoutAgent открой страницу (Web Scraper)
    и извлеки: название, номер лота, номер проекта, номер гранта, бюджет,
    дата IFB, дедлайн, метод закупки (NCB/ICB/RFQ), диаметр труб, длину.
    Если данные недоступны — "нет данных". Не посещай более 3 ссылок.
  expected_output: >
    JSON-список с полными деталями каждого тендера (поля модели Tender).

contact_task:
  description: >
    Для каждого проекта найди контакты: ПИУ/ПМУ, директор, email, телефон, адрес.
    СНАЧАЛА проверь встроенную базу известных контактов (она в твоих знаниях).
    Только если проект неизвестный — используй DuckDuckGo с запросом
    "[название проекта] PIU email Tajikistan".
    Не трать более 1 поиска на проект.
  expected_output: >
    JSON-список контактов: project_id, piu, director, email, phone, address, contractor.

pipe_task:
  description: >
    Проверь каждый тендер из списка DetailsAgent. Оцени пригодность для composite.tj.

    Правила:
    - DN >=400 мм явно + магистральный/ирригационный + бюджет >$3M → HIGH
    - Водоснабжение/ирригация без указания диаметра + бюджет $0.5M-$3M → MEDIUM
    - Только общее упоминание воды → LOW
    - DN <400 мм явно / газ / нефть / электро → NO

    Для каждого тендера верни: project_id, pipe_diameter_mm, pipe_material,
    pipe_length_km, dn_400_confirmed, suitability, technical_notes.
    Не используй веб-инструменты — анализируй только имеющиеся данные.
  expected_output: >
    JSON-список: project_id, pipe_diameter_mm, pipe_material, pipe_length_km,
    dn_400_confirmed, suitability (HIGH/MEDIUM/LOW/NO), technical_notes.

risk_task:
  description: >
    Для каждого проекта из DetailsAgent оцени риски:
    1. Временной: дедлайн <14 дней=HIGH, 14-60=MEDIUM, >60=LOW
    2. Конкурентный: ICB=HIGH, NCB=MEDIUM, RFQ=LOW
    3. Технический: нестандартный DN (560,930) = нужен сертификат
    4. Административный: IsDB/EFSD = незнакомые правила
    5. Финансовый: бюджет <$1M = низкий приоритет

    Итог: urgency (HIGH/MEDIUM/LOW), risk_score (1-10), recommendations.
    Не используй веб-инструменты.
  expected_output: >
    JSON-список: project_id, urgency, risk_score, risk_details, recommendations.

report_task:
  description: >
    Собери данные от DetailsAgent, PipeAgent и RiskAgent.
    Вызови инструмент "Excel Registry Writer" один раз с параметрами:
    - projects_json: объединённый JSON всех тендеров со всеми полями модели Tender
    - summary_text: краткое резюме (топ-3 срочных, топ-3 стратегических, список email)
    - contacts_json: JSON контактов от ContactAgent

    В projects_json для каждого проекта объедини данные из всех агентов:
    поля details + pipe (suitability, dn_400_confirmed, pipe_diameter_mm) + risk (urgency, risks).
  expected_output: >
    Подтверждение создания файлов с их путями.
    Резюме: количество проектов, топ-3 срочных, суммарный потенциальный бюджет.
